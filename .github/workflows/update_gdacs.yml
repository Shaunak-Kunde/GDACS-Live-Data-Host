name: Refresh GDACS Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Latest GDACS Feed
        run: |
          curl -L -o data/gdacs.geojson https://www.gdacs.org/xml/gdacs.geojson

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Auto refresh GDACS feed" || echo "No changes"

          git push
